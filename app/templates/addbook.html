<!DOCTYPE html>
<html>

<head>

<title>Add Book</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#eef2ff;
overflow-x:hidden;
}

.sidebar{
height:100vh;
background:linear-gradient(to bottom,#0f172a,#1e293b);
padding:30px 15px;
position:fixed;
width:260px;
}

.sidebar h3{
color:white;
margin-bottom:40px;
text-align:center;
font-weight:bold;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:15px;
margin-bottom:10px;
border-radius:12px;
}

.sidebar a:hover{
background:#334155;
}

.main{
margin-left:270px;
padding:40px;
}

.card{
border:none;
border-radius:25px;
}

</style>

</head>

<body>

<div class="sidebar">

<h3>
Library Admin
</h3>

<a href="/dashboard">Dashboard</a>

<a href="/books">Books</a>

<a href="/addbook">Add Book</a>

<a href="/users">Users</a>

<a href="/allocatedbooks">Allocated Books</a>

<a href="/logout">Logout</a>

</div>

<div class="main">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow-lg">

<div class="card-body p-4">

<h2 class="mb-4">
Add New Book
</h2>

<form action="/add" method="POST">

<input
type="text"
name="title"
class="form-control mb-3"
placeholder="Book Title"
required
>

<input
type="text"
name="author"
class="form-control mb-3"
placeholder="Author"
required
>

<input
type="text"
name="category"
class="form-control mb-3"
placeholder="Category"
required
>

<input
type="number"
name="quantity"
class="form-control mb-4"
placeholder="Quantity"
required
>

<button class="btn btn-primary w-100">
Add Book
</button>

</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
