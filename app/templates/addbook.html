<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Book</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#0f172a;
overflow-x:hidden;
color:white;
}

/* Sidebar */

.sidebar{
position:fixed;
top:0;
left:0;
width:270px;
height:100vh;
background:rgba(15,23,42,0.95);
backdrop-filter:blur(15px);
padding:30px 20px;
border-right:1px solid rgba(255,255,255,0.08);
z-index:1000;
overflow-y:auto;
}

.logo{
font-size:28px;
font-weight:700;
text-align:center;
margin-bottom:45px;
color:white;
}

.sidebar a{
display:flex;
align-items:center;
gap:14px;
padding:15px 18px;
margin-bottom:12px;
border-radius:16px;
text-decoration:none;
font-size:16px;
font-weight:500;
color:#cbd5e1;
transition:0.3s ease;
}

.sidebar a:hover{
background:linear-gradient(to right,#2563eb,#7c3aed);
color:white;
transform:translateX(5px);
}

.sidebar a i{
font-size:18px;
}

/* Main */

.main{
margin-left:270px;
padding:40px;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg,#020617,#111827,#1e293b);
}

/* Add Book Card */

.book-card{
width:100%;
max-width:650px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:32px;
padding:40px;
box-shadow:0 10px 30px rgba(0,0,0,0.35);
position:relative;
overflow:hidden;
}

.book-card::before{
content:'';
position:absolute;
width:220px;
height:220px;
background:rgba(255,255,255,0.05);
border-radius:50%;
top:-70px;
right:-70px;
}

.book-card::after{
content:'';
position:absolute;
width:170px;
height:170px;
background:rgba(255,255,255,0.04);
border-radius:50%;
bottom:-60px;
left:-60px;
}

/* Heading */

.page-title{
font-size:38px;
font-weight:700;
margin-bottom:12px;
position:relative;
z-index:2;
}

.page-subtitle{
color:#cbd5e1;
margin-bottom:35px;
font-size:16px;
position:relative;
z-index:2;
}

/* Inputs */

.form-control{
height:58px;
border:none;
border-radius:16px;
background:rgba(255,255,255,0.1);
color:white;
padding-left:18px;
font-size:15px;
margin-bottom:20px;
position:relative;
z-index:2;
}

.form-control::placeholder{
color:#cbd5e1;
}

.form-control:focus{
background:rgba(255,255,255,0.14);
color:white;
box-shadow:none;
border:1px solid rgba(255,255,255,0.1);
}

/* Button */

.btn-add{
width:100%;
height:58px;
border:none;
border-radius:16px;
font-size:17px;
font-weight:600;
background:linear-gradient(to right,#2563eb,#7c3aed);
color:white;
transition:0.3s ease;
position:relative;
z-index:2;
}

.btn-add:hover{
transform:translateY(-4px);
}

/* Responsive */

@media(max-width:992px){

.sidebar{
width:100%;
height:auto;
position:relative;
border-right:none;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.main{
margin-left:0;
padding:25px;
}

.sidebar a:hover{
transform:none;
}

}

@media(max-width:768px){

.book-card{
padding:30px 25px;
border-radius:25px;
}

.page-title{
font-size:30px;
}

}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo">
📚 Library Admin
</div>

<a href="/dashboard">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="/books">
<i class="fa-solid fa-book"></i>
Books
</a>

<a href="/addbook">
<i class="fa-solid fa-square-plus"></i>
Add Book
</a>

<a href="/users">
<i class="fa-solid fa-users"></i>
Users
</a>

<a href="/allocatedbooks">
<i class="fa-solid fa-book-open-reader"></i>
Allocated Books
</a>

<a href="/logout">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</a>

</div>

<!-- Main Content -->

<div class="main">

<div class="book-card">

<h1 class="page-title">
Add New Book
</h1>

<p class="page-subtitle">
Enter the book details to add them into the library system.
</p>

<form action="/add" method="POST">

<input
type="text"
name="title"
class="form-control"
placeholder="Book Title"
required
>

<input
type="text"
name="author"
class="form-control"
placeholder="Author Name"
required
>

<input
type="text"
name="category"
class="form-control"
placeholder="Book Category"
required
>

<input
type="number"
name="quantity"
class="form-control"
placeholder="Quantity"
required
>

<button class="btn-add">
<i class="fa-solid fa-plus"></i>
Add Book
</button>

</form>

</div>

</div>

</body>

</html>
