<!DOCTYPE html>
<html>

<head>

<title>Allocated Books</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#eef2ff;
overflow-x:hidden;
}

.sidebar{
height:100vh;
background:linear-gradient(to bottom,#0f172a,#1e293b);
padding:30px 15px;
position:fixed;
width:260px;
}

.sidebar h3{
color:white;
margin-bottom:40px;
text-align:center;
font-weight:bold;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:15px;
margin-bottom:10px;
border-radius:12px;
}

.sidebar a:hover{
background:#334155;
}

.main{
margin-left:270px;
padding:40px;
}

.card{
border:none;
border-radius:25px;
}

</style>

</head>

<body>

<div class="sidebar">

<h3>
Library Admin
</h3>

<a href="/dashboard">Dashboard</a>

<a href="/books">Books</a>

<a href="/addbook">Add Book</a>

<a href="/users">Users</a>

<a href="/allocatedbooks">Allocated Books</a>

<a href="/logout">Logout</a>

</div>

<div class="main">

<div class="card shadow-lg">

<div class="card-body">

<h2 class="mb-4">
Allocated Books
</h2>

<table class="table table-hover">

<thead>

<tr>

<th>Student</th>

<th>USN</th>

<th>Book</th>

<th>Author</th>

<th>Issue Date</th>

<th>Action</th>

</tr>

</thead>

<tbody>

{% for book in books %}

<tr>

<td>{{ book.name }}</td>

<td>{{ book.usn }}</td>

<td>{{ book.title }}</td>

<td>{{ book.author }}</td>

<td>{{ book.issue_date }}</td>

<td>

<a
href="/returnbook/{{ book.id }}"
class="btn btn-success btn-sm"
>
Return
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</body>

</html>
