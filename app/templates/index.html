<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Library Management DevOps System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
min-height:100vh;
background:
linear-gradient(135deg,#020617,#0f172a,#1e293b);
overflow-x:hidden;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
position:relative;
color:white;
}

/* Background Glow Effects */

body::before{
content:'';
position:absolute;
width:450px;
height:450px;
background:#2563eb;
border-radius:50%;
filter:blur(180px);
top:-120px;
left:-120px;
opacity:0.35;
}

body::after{
content:'';
position:absolute;
width:450px;
height:450px;
background:#9333ea;
border-radius:50%;
filter:blur(180px);
bottom:-120px;
right:-120px;
opacity:0.35;
}

/* Main Container */

.main-container{
width:100%;
max-width:1100px;
position:relative;
z-index:10;
}

/* Glassmorphism Card */

.hero-card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.1);
border-radius:35px;
padding:80px 50px;
text-align:center;
box-shadow:
0px 10px 40px rgba(0,0,0,0.5),
inset 0px 1px 1px rgba(255,255,255,0.1);
overflow:hidden;
position:relative;
}

.hero-card::before{
content:'';
position:absolute;
width:220px;
height:220px;
background:rgba(255,255,255,0.05);
border-radius:50%;
top:-70px;
right:-70px;
}

.hero-card::after{
content:'';
position:absolute;
width:170px;
height:170px;
background:rgba(255,255,255,0.04);
border-radius:50%;
bottom:-60px;
left:-60px;
}

/* Small Badge */

.badge-custom{
display:inline-block;
padding:10px 25px;
border-radius:50px;
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.1);
font-size:14px;
letter-spacing:1px;
margin-bottom:25px;
text-transform:uppercase;
}

/* Main Heading */

.hero-title{
font-size:clamp(3rem,6vw,5.5rem);
font-weight:700;
line-height:1.2;
}

/* Gradient Text */

.highlight{
background:linear-gradient(to right,#38bdf8,#a855f7);
background-clip:text;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* Description */

.hero-text{
font-size:19px;
color:#cbd5e1;
margin-top:25px;
line-height:1.9;
max-width:850px;
margin-left:auto;
margin-right:auto;
}

/* Login Button */

.btn-custom{
margin-top:45px;
padding:16px 50px;
font-size:18px;
font-weight:600;
border:none;
border-radius:16px;
background:linear-gradient(to right,#f59e0b,#f97316);
color:white;
text-decoration:none;
display:inline-block;
transition:0.35s ease;
box-shadow:0px 10px 30px rgba(249,115,22,0.45);
}

.btn-custom:hover{
transform:translateY(-5px) scale(1.03);
box-shadow:0px 15px 40px rgba(249,115,22,0.65);
}

/* Responsive */

@media(max-width:992px){

.hero-card{
padding:60px 35px;
}

}

@media(max-width:768px){

body{
padding:15px;
}

.hero-card{
padding:45px 25px;
border-radius:25px;
}

.hero-title{
font-size:42px;
}

.hero-text{
font-size:16px;
line-height:1.7;
}

.btn-custom{
width:100%;
}

}

</style>

</head>

<body>

<div class="main-container">

<div class="hero-card">

<div class="badge-custom">
Modern Digital Library
</div>

<h1 class="hero-title">
Library Management
<span class="highlight">
DevOps System
</span>
</h1>

<p class="hero-text">HELLO,
Welcome to the next-generation Library Management platform built with modern DevOps practices.
Manage books, users, and administration through a fast, secure, elegant, and fully responsive interface.
</p>

<a href="/login" class="btn-custom">
Admin Login
</a>

</div>

</div>

</body>

</html>
