<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
min-height:100vh;
background:
linear-gradient(135deg,#020617,#0f172a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
position:relative;
}

/* Background Glow */

body::before{
content:'';
position:absolute;
width:420px;
height:420px;
background:#2563eb;
border-radius:50%;
filter:blur(180px);
top:-120px;
left:-120px;
opacity:0.35;
}

body::after{
content:'';
position:absolute;
width:420px;
height:420px;
background:#9333ea;
border-radius:50%;
filter:blur(180px);
bottom:-120px;
right:-120px;
opacity:0.35;
}

/* Login Card */

.login-card{
position:relative;
z-index:10;
width:100%;
max-width:430px;
padding:50px 40px;
border-radius:30px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:
0px 10px 40px rgba(0,0,0,0.5),
inset 0px 1px 1px rgba(255,255,255,0.1);
overflow:hidden;
}

/* Decorative Circles */

.login-card::before{
content:'';
position:absolute;
width:180px;
height:180px;
background:rgba(255,255,255,0.05);
border-radius:50%;
top:-60px;
right:-60px;
}

.login-card::after{
content:'';
position:absolute;
width:140px;
height:140px;
background:rgba(255,255,255,0.04);
border-radius:50%;
bottom:-50px;
left:-50px;
}

/* Title */

.login-title{
font-size:34px;
font-weight:700;
color:white;
text-align:center;
margin-bottom:10px;
position:relative;
z-index:2;
}

.login-subtitle{
text-align:center;
color:#cbd5e1;
margin-bottom:35px;
position:relative;
z-index:2;
}

/* Input Fields */

.form-control{
height:55px;
border-radius:15px;
border:none;
background:rgba(255,255,255,0.12);
color:white;
padding-left:18px;
font-size:15px;
margin-bottom:20px;
position:relative;
z-index:2;
}

.form-control::placeholder{
color:#d1d5db;
}

.form-control:focus{
background:rgba(255,255,255,0.16);
color:white;
box-shadow:none;
border:1px solid rgba(255,255,255,0.2);
}

/* Button */

.btn-login{
width:100%;
height:55px;
border:none;
border-radius:15px;
font-size:17px;
font-weight:600;
background:linear-gradient(to right,#f59e0b,#f97316);
color:white;
transition:0.35s ease;
box-shadow:0px 10px 25px rgba(249,115,22,0.4);
position:relative;
z-index:2;
}

.btn-login:hover{
transform:translateY(-4px);
box-shadow:0px 15px 35px rgba(249,115,22,0.6);
}

/* Bottom Text */

.bottom-text{
margin-top:25px;
text-align:center;
font-size:14px;
color:#cbd5e1;
position:relative;
z-index:2;
}

/* Responsive */

@media(max-width:576px){

.login-card{
padding:40px 25px;
border-radius:25px;
}

.login-title{
font-size:28px;
}

}

</style>

</head>

<body>

<div class="login-card">

<h2 class="login-title">
Admin Login
</h2>

<p class="login-subtitle">
Secure access to the Library Management Dashboard
</p>

<form action="/loginuser" method="POST">

<input
type="email"
name="email"
class="form-control"
placeholder="Enter Email Address"
required
>

<input
type="password"
name="password"
class="form-control"
placeholder="Enter Password"
required
>

<button class="btn-login">
Login
</button>

</form>

<div class="bottom-text">
Library Management DevOps System
</div>

</div>

</body>

</html>
