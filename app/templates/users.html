<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Users Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#0f172a;
overflow-x:hidden;
color:white;
}

/* Sidebar */

.sidebar{
position:fixed;
top:0;
left:0;
width:270px;
height:100vh;
background:rgba(15,23,42,0.95);
backdrop-filter:blur(15px);
padding:30px 20px;
border-right:1px solid rgba(255,255,255,0.08);
z-index:1000;
overflow-y:auto;
}

.logo{
font-size:28px;
font-weight:700;
text-align:center;
margin-bottom:45px;
color:white;
}

.sidebar a{
display:flex;
align-items:center;
gap:14px;
padding:15px 18px;
margin-bottom:12px;
border-radius:16px;
text-decoration:none;
font-size:16px;
font-weight:500;
color:#cbd5e1;
transition:0.3s ease;
}

.sidebar a:hover{
background:linear-gradient(to right,#2563eb,#7c3aed);
color:white;
transform:translateX(5px);
}

.sidebar a i{
font-size:18px;
}

/* Main */

.main{
margin-left:270px;
padding:40px;
min-height:100vh;
background:
linear-gradient(135deg,#020617,#111827,#1e293b);
}

/* Page Title */

.page-title{
font-size:42px;
font-weight:700;
margin-bottom:35px;
}

/* Cards */

.custom-card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:30px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.35);
height:100%;
}

/* Form */

.form-title{
font-size:28px;
font-weight:700;
margin-bottom:25px;
}

.form-control{
height:54px;
border:none;
border-radius:14px;
background:rgba(255,255,255,0.1);
color:white;
padding-left:18px;
margin-bottom:18px;
}

.form-control::placeholder{
color:#cbd5e1;
}

.form-control:focus{
background:rgba(255,255,255,0.14);
color:white;
box-shadow:none;
border:1px solid rgba(255,255,255,0.1);
}

/* Buttons */

.btn-add{
width:100%;
height:54px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:600;
background:linear-gradient(to right,#2563eb,#7c3aed);
color:white;
transition:0.3s ease;
}

.btn-add:hover{
transform:translateY(-4px);
}

.btn-delete{
background:linear-gradient(to right,#dc2626,#b91c1c);
border:none;
padding:8px 15px;
border-radius:10px;
font-size:14px;
font-weight:500;
color:white;
transition:0.3s ease;
text-decoration:none;
display:inline-block;
}

.btn-delete:hover{
transform:translateY(-3px);
}

/* Header */

.table-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
gap:20px;
flex-wrap:wrap;
}

.table-title{
font-size:28px;
font-weight:700;
}

/* Search */

.search-box{
max-width:320px;
}

/* Table */

.table-container{
overflow-x:auto;
}

.table{
color:white;
margin-bottom:0;
min-width:700px;
}

.table thead{
background:rgba(255,255,255,0.08);
}

.table th{
padding:18px;
border:none;
font-weight:600;
color:white;
}

.table td{
padding:18px;
vertical-align:middle;
border-color:rgba(255,255,255,0.08);
color:#e2e8f0;
}

.table tbody tr{
transition:0.3s ease;
}

.table tbody tr:hover{
background:rgba(255,255,255,0.05);
}

/* Responsive */

@media(max-width:992px){

.sidebar{
width:100%;
height:auto;
position:relative;
border-right:none;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.main{
margin-left:0;
padding:25px;
}

.sidebar a:hover{
transform:none;
}

}

@media(max-width:768px){

.page-title{
font-size:32px;
}

.custom-card{
padding:25px;
}

.form-title,
.table-title{
font-size:24px;
}

.search-box{
max-width:100%;
width:100%;
}

}

</style>

<script>

function searchStudents() {

let input =
document.getElementById("studentSearch").value.toLowerCase();

let rows =
document.querySelectorAll("#studentTable tbody tr");

rows.forEach(row => {

let text =
row.innerText.toLowerCase();

row.style.display =
text.includes(input) ? "" : "none";

});

}

</script>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo">
📚 Library Admin
</div>

<a href="/dashboard">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="/books">
<i class="fa-solid fa-book"></i>
Books
</a>

<a href="/addbook">
<i class="fa-solid fa-square-plus"></i>
Add Book
</a>

<a href="/users">
<i class="fa-solid fa-users"></i>
Users
</a>

<a href="/allocatedbooks">
<i class="fa-solid fa-book-open-reader"></i>
Allocated Books
</a>

<a href="/logout">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</a>

</div>

<!-- Main Content -->

<div class="main">

<h1 class="page-title">
Users Management
</h1>

<div class="row g-4">

<!-- Add Student -->

<div class="col-lg-5">

<div class="custom-card">

<h3 class="form-title">
Add Student
</h3>

<form action="/adduser" method="POST">

<input
type="text"
name="name"
class="form-control"
placeholder="Student Name"
required
>

<input
type="email"
name="email"
class="form-control"
placeholder="Email Address"
required
>

<input
type="text"
name="phone"
class="form-control"
placeholder="Phone Number"
required
>

<input
type="text"
name="usn"
class="form-control"
placeholder="USN"
required
>

<input
type="text"
name="department"
class="form-control"
placeholder="Department"
required
>

<input
type="password"
name="password"
class="form-control"
placeholder="Password"
required
>

<button class="btn-add">
<i class="fa-solid fa-user-plus"></i>
Add Student
</button>

</form>

</div>

</div>

<!-- Registered Students -->

<div class="col-lg-7">

<div class="custom-card">

<div class="table-header">

<h3 class="table-title">
Registered Students
</h3>

<input
type="text"
id="studentSearch"
class="form-control search-box"
placeholder="Search by Name or USN"
onkeyup="searchStudents()"
>

</div>

<div class="table-container">

<table class="table" id="studentTable">

<thead>

<tr>

<th>Name</th>

<th>USN</th>

<th>Department</th>

<th>Phone</th>

<th>Action</th>

</tr>

</thead>

<tbody>

{% for user in users %}

<tr>

<td>{{ user.name }}</td>

<td>{{ user.usn }}</td>

<td>{{ user.department }}</td>

<td>{{ user.phone }}</td>

<td>

<a
href="/deleteuser/{{ user.id }}"
class="btn-delete"
>
<i class="fa-solid fa-trash"></i>
Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
