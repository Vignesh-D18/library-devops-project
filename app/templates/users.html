<!DOCTYPE html>
<html>

<head>

<title>Users</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#eef2ff;
overflow-x:hidden;
}

.sidebar{
height:100vh;
background:linear-gradient(to bottom,#0f172a,#1e293b);
padding:30px 15px;
position:fixed;
width:260px;
}

.sidebar h3{
color:white;
margin-bottom:40px;
text-align:center;
font-weight:bold;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:15px;
margin-bottom:10px;
border-radius:12px;
}

.sidebar a:hover{
background:#334155;
}

.main{
margin-left:270px;
padding:40px;
}

.card{
border:none;
border-radius:25px;
}

</style>

<script>

function searchStudents() {

    let input =
    document.getElementById("studentSearch").value.toLowerCase();

    let rows =
    document.querySelectorAll("#studentTable tbody tr");

    rows.forEach(row => {

        let text =
        row.innerText.toLowerCase();

        row.style.display =
        text.includes(input) ? "" : "none";

    });
}

</script>

</head>

<body>

<div class="sidebar">

<h3>
Library Admin
</h3>

<a href="/dashboard">Dashboard</a>

<a href="/books">Books</a>

<a href="/addbook">Add Book</a>

<a href="/users">Users</a>

<a href="/allocatedbooks">Allocated Books</a>

<a href="/logout">Logout</a>

</div>

<div class="main">

<div class="row">

<div class="col-md-5">

<div class="card shadow-lg">

<div class="card-body p-4">

<h3 class="mb-4">
Add Student
</h3>

<form action="/adduser" method="POST">

<input
type="text"
name="name"
class="form-control mb-3"
placeholder="Student Name"
required
>

<input
type="email"
name="email"
class="form-control mb-3"
placeholder="Email"
required
>

<input
type="text"
name="phone"
class="form-control mb-3"
placeholder="Phone Number"
required
>

<input
type="text"
name="usn"
class="form-control mb-3"
placeholder="USN"
required
>

<input
type="text"
name="department"
class="form-control mb-3"
placeholder="Department"
required
>

<input
type="password"
name="password"
class="form-control mb-4"
placeholder="Password"
required
>

<button class="btn btn-primary w-100">
Add Student
</button>

</form>

</div>

</div>

</div>

<div class="col-md-7">

<div class="card shadow-lg">

<div class="card-body">

<div class="d-flex justify-content-between mb-4">

<h3>
Registered Students
</h3>

<input
type="text"
id="studentSearch"
class="form-control w-50"
placeholder="Search by Name or USN"
onkeyup="searchStudents()"
>

</div>

<table class="table table-hover" id="studentTable">

<thead>

<tr>

<th>Name</th>

<th>USN</th>

<th>Department</th>

<th>Phone</th>

<th>Action</th>

</tr>

</thead>

<tbody>

{% for user in users %}

<tr>

<td>{{ user.name }}</td>

<td>{{ user.usn }}</td>

<td>{{ user.department }}</td>

<td>{{ user.phone }}</td>

<td>

<a
href="/deleteuser/{{ user.id }}"
class="btn btn-danger btn-sm"
>
Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
