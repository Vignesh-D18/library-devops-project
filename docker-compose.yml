services:

  mysql:

    image: mysql:8

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: NewPassword123
      MYSQL_DATABASE: librarydb

    ports:
      - "3308:3306"

    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d

  flaskapp:

    build: ./app

    restart: always

    ports:
      - "5001:5000"

    depends_on:
      - mysql